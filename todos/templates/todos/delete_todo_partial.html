{% load i18n %}
<div class="text-center">
    <p class="text-gray-700 mb-2">{% trans "Deseja realmente remover este afazer?" %}</p>
    <p class="font-bold text-lg text-gray-900 mb-6">"{{ todo.title }}"</p>
    
    <form method="POST" action="{% url 'delete_todo' todo.pk %}" class="mt-2">
        {% csrf_token %}
        <div class="flex justify-center gap-4">
            <button type="button" onclick="closeTodoModal()" class="px-6 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-md transition font-medium cursor-pointer">
                {% trans "Cancelar" %}
            </button>
            <button type="submit" class="px-6 py-2 border-2 border-violet-600 text-violet-600 hover:bg-violet-50 rounded-md transition font-medium cursor-pointer">
                {% trans "Confirmar" %}
            </button>
        </div>
    </form>
</div>
