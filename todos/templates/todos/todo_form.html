{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
        <h2 class="text-3xl font-satisfy text-violet-800 mb-4 text-center">{{ title }}</h2>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1 text-left" for="{{ field.id_for_label }}">
                    {{ field.label }}{% if field.field.required %}<span class="ml-0.5 text-red-600" aria-hidden="true">*</span>{% endif %}
                </label>
                {{ field }}
                {% if field.errors %}
                <p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            
            <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                <a href="{% url 'home' %}" class="px-4 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-md transition font-medium">
                    {% trans "Cancelar" %}
                </a>
                <button type="submit" class="px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-md transition font-medium">
                    {% trans "Salvar" %}
                </button>
            </div>
        </form>
    </div>
</div>{% endblock %}
