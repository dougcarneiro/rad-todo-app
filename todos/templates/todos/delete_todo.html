{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 text-center">
        <h2 class="text-4xl font-satisfy text-violet-800 mb-4">{% trans "Remover Afazer" %}</h2>
        
        <p class="text-gray-700 mb-2">{% trans "Deseja realmente remover este afazer?" %}</p>
        <p class="font-bold text-lg text-gray-900 mb-6">"{{ todo.title }}"</p>
        
        <form method="POST" class="mt-2">
            {% csrf_token %}
            <div class="flex justify-center gap-4">
                <a href="{% url 'home' %}" class="px-6 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-md transition font-medium">
                    {% trans "Cancelar" %}
                </a>
                <button type="submit" class="px-6 py-2 border-2 border-violet-600 text-violet-600 hover:bg-violet-50 rounded-md transition font-medium">
                    {% trans "Confirmar" %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
