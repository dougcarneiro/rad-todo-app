{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Meus Afazeres" %}</title>
    <!-- Fonts from Angular Project -->
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              satisfy: ['Satisfy', 'cursive'],
              montserrat: ['Montserrat', 'sans-serif'],
            },
            colors: {
              violet: {
                100: '#ede9fe',
                200: '#ddd6fe',
                500: '#8b5cf6',
                600: '#7c3aed',
                800: '#5b21b6',
                900: '#4c1d95',
              }
            }
          }
        }
      }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.1"></script>
    <style>
      body { background-color: #ddd6fe; } /* violet-200 */
      .font-satisfy { font-family: 'Satisfy', cursive; }
      .font-montserrat { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="font-montserrat text-gray-800 min-h-screen" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>



    <main class="container mx-auto p-4 md:p-8">
        {% block content %}
        {% endblock content %}
    </main>

    <script src="{% static 'js/todo.js' %}"></script>
</body>
</html>
